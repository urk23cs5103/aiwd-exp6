<html lang="en"><head><meta charset="UTF-8"><title>Event Registration</title><script src="https://code.jquery.com/jquery-3.6.0.min.js"></script><style>.error {    color: red;}.success {    color: green;}input {    display: block;    margin: 10px 0;    padding: 6px;}</style></head><body><h2>Event Registration Form</h2><form id="regForm">    <input type="text" id="name" placeholder="Participant Name">    <span id="nameError" class="error"></span>    <input type="text" id="email" placeholder="Email">    <span id="emailError" class="error"></span>    <input type="text" id="eventName" readonly>    <span id="eventError" class="error"></span>    <input type="text" id="mobile" placeholder="Mobile Number">    <span id="mobileError" class="error"></span>    <button type="button" id="submitBtn">Submit</button>    <button type="button" id="resetBtn">Reset</button></form><p id="message"></p><script>$(document).ready(function(){    // Get event name from URL    const params = new URLSearchParams(window.location.search);    const event = params.get("event");    if(event){        $("#eventName").val(event);    }    $("#submitBtn").click(function(){        let name = $("#name").val().trim();        let email = $("#email").val().trim();        let mobile = $("#mobile").val().trim();        let eventName = $("#eventName").val();        let valid = true;        // Clear previous errors        $(".error").text("");        $("#message").text("");        $("input").css("border", "1px solid black");        // Name validation        if(name === ""){            $("#nameError").text("Name required");            $("#name").css("border", "2px solid red");            valid = false;        }        // Email validation        let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;        if(email === ""){            $("#emailError").text("Email required");            $("#email").css("border", "2px solid red");            valid = false;        } else if(!emailPattern.test(email)){            $("#emailError").text("Invalid email format");            $("#email").css("border", "2px solid red");            valid = false;        }        // Mobile validation        let mobilePattern = /^[0-9]{10,}$/;        if(mobile === ""){            $("#mobileError").text("Mobile required");            $("#mobile").css("border", "2px solid red");            valid = false;        } else if(!mobilePattern.test(mobile)){            $("#mobileError").text("Enter at least 10 digits");            $("#mobile").css("border", "2px solid red");            valid = false;        }        // Event validation        if(eventName === ""){            $("#eventError").text("Event not selected");            valid = false;        }        // Success        if(valid){            $("#message")                .text("Registration Successful for " + name)                .removeClass("error")                .addClass("success");            $("#submitBtn")                .prop("disabled", true)                .text("Registered");        }    });    // Reset button    $("#resetBtn").click(function(){        $("#regForm")[0].reset();        $(".error").text("");        $("#message").text("");        $("input").css("border", "1px solid black");        $("#submitBtn")            .prop("disabled", false)            .text("Submit");    });});</script></body></html>
